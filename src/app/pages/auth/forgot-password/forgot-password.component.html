<div class="auth-card animate-slide-up">
    <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your email to receive a reset link</p>
    </div>

    <div *ngIf="isSuccess" class="success-message">
        <div class="icon-circle">
            <i class="ri-mail-check-line"></i>
        </div>
        <h3>Check your mail</h3>
        <p>We have sent a password reset link to your email.</p>
        <a routerLink="/auth/login" class="btn-primary btn-block back-btn">
            Back to Login
        </a>
    </div>

    <div *ngIf="!isSuccess">
        <div *ngIf="errorMessage" class="error-alert">
            <i class="ri-error-warning-line"></i>
            <span>{{ errorMessage }}</span>
        </div>

        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper"
                    [class.error]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
                    <i class="ri-mail-line input-icon"></i>
                    <input type="email" id="email" formControlName="email" class="form-input"
                        placeholder="name@example.com">
                </div>
                <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="error-msg">
                    Email is required
                </div>
            </div>

            <button type="submit" class="btn-primary btn-block" [disabled]="isLoading || forgotForm.invalid">
                <span *ngIf="!isLoading">Send Reset Link</span>
                <div *ngIf="isLoading" class="spinner"></div>
            </button>
        </form>

        <div class="auth-footer">
            <a routerLink="/auth/login" class="link-secondary">
                <i class="ri-arrow-left-line"></i> Back to Login
            </a>
        </div>
    </div>
</div>
