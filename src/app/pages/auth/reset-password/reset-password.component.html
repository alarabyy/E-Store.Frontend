<div class="auth-card animate-slide-up">
    <div class="auth-header">
        <h1>Set New Password</h1>
        <p>Your new password must be different from previously used passwords.</p>
    </div>

    <!-- Success State -->
    <div *ngIf="isSuccess" class="success-message">
        <div class="icon-circle">
            <i class="ri-check-line"></i>
        </div>
        <h3>Password Reset Successful</h3>
        <p>You can now login with your new password.</p>
        <a routerLink="/auth/login" class="btn-primary btn-block back-btn">
            Login Now
        </a>
    </div>

    <!-- Form State -->
    <div *ngIf="!isSuccess">
        <div *ngIf="errorMessage" class="error-alert">
            <i class="ri-error-warning-line"></i>
            <span>{{ errorMessage }}</span>
        </div>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="input-wrapper"
                    [class.error]="resetForm.get('password')?.invalid && resetForm.get('password')?.touched">
                    <i class="ri-lock-line input-icon"></i>
                    <input type="password" id="password" formControlName="password" class="form-input"
                        placeholder="Enter new password">
                </div>
                <div *ngIf="resetForm.get('password')?.errors?.['minlength'] && resetForm.get('password')?.touched"
                    class="error-msg">
                    Password must be at least 8 characters
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <div class="input-wrapper"
                    [class.error]="resetForm.get('confirmPassword')?.invalid && resetForm.get('confirmPassword')?.touched">
                    <i class="ri-lock-check-line input-icon"></i>
                    <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-input"
                        placeholder="Confirm new password">
                </div>
                <div *ngIf="resetForm.errors?.['passwordMismatch'] && resetForm.get('confirmPassword')?.touched"
                    class="error-msg">
                    Passwords do not match
                </div>
            </div>

            <button type="submit" class="btn-primary btn-block" [disabled]="isLoading || resetForm.invalid">
                <span *ngIf="!isLoading">Reset Password</span>
                <div *ngIf="isLoading" class="spinner"></div>
            </button>
        </form>
    </div>
</div>
