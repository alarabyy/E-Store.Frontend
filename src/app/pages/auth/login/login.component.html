<div class="auth-card animate-slide-up">
    <div class="auth-header">
        <div class="header-icon">
            <i class="ri-key-2-line"></i>
        </div>
        <h1>Welcome Back</h1>
        <p>Enter your credentials to access your exclusive elite shopping world.</p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="error-alert">
        <i class="ri-error-warning-fill"></i>
        <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <!-- Email Input -->
        <div class="form-group">
            <label for="email">Membership Email</label>
            <div class="input-wrapper"
                [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                <i class="ri-mail-star-line input-icon"></i>
                <input type="email" id="email" formControlName="email" placeholder="e.g. elite@nizamek.com"
                    class="form-input">
            </div>
            <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-msg">
                Please enter a valid email address
            </div>
        </div>

        <!-- Password Input -->
        <div class="form-group">
            <div class="label-row">
                <label for="password">Private Key</label>
            </div>
            <div class="input-wrapper"
                [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <i class="ri-lock-password-line input-icon"></i>
                <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
                    placeholder="••••••••" class="form-input">
                <button type="button" class="toggle-password" (click)="togglePassword()">
                    <i [class]="showPassword ? 'ri-eye-line' : 'ri-eye-off-line'"></i>
                </button>
            </div>
            <div class="forgot-password-link">
                <a routerLink="/auth/forgot-password">Trouble signing in?</a>
            </div>
            <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-msg">
                Security key is required
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-primary btn-block" [disabled]="isLoading || loginForm.invalid">
            <span *ngIf="!isLoading">Authorize Access</span>
            <div *ngIf="isLoading" class="spinner"></div>
        </button>

        <!-- Divider -->
        <div class="divider">
            <span>Or use luxury sign-in</span>
        </div>

        <!-- Social Login -->
        <div class="google-btn-wrapper">
            <div class="google-inner-shadow">
                <asl-google-signin-button type="standard" size="large" text="signin_with" shape="pill"
                    theme="filled_black"></asl-google-signin-button>
            </div>
        </div>
    </form>

    <div class="auth-footer">
        <p>New to Nizamek? <a routerLink="/auth/register" class="link-primary">Join the Elite</a></p>
    </div>
</div>
