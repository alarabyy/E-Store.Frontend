<div class="auth-card animate-slide-up">
    <div class="auth-header">
        <div class="header-icon">
            <i class="ri-membership-line"></i>
        </div>
        <h1>Begin Your Legacy</h1>
        <p>Join the Nizamek Elite and unlock a world of curated tech elegance.</p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="error-alert">
        <i class="ri-error-warning-fill"></i>
        <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">

        <!-- Name Inputs -->
        <div class="form-row">
            <div class="form-group half-width">
                <label for="firstName">Given Name</label>
                <div class="input-wrapper"
                    [class.error]="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched">
                    <i class="ri-user-star-line input-icon"></i>
                    <input type="text" id="firstName" formControlName="firstName" class="form-input"
                        placeholder="e.g. John">
                </div>
            </div>
            <div class="form-group half-width">
                <label for="lastName">Family Name</label>
                <div class="input-wrapper"
                    [class.error]="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched">
                    <i class="ri-user-star-line input-icon"></i>
                    <input type="text" id="lastName" formControlName="lastName" class="form-input"
                        placeholder="e.g. Doe">
                </div>
            </div>
        </div>

        <!-- Username Input -->
        <div class="form-group">
            <label for="username">Elite Handle</label>
            <div class="input-wrapper"
                [class.error]="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
                <i class="ri-at-line input-icon"></i>
                <input type="text" id="username" formControlName="username" class="form-input"
                    placeholder="johndoe_elite">
            </div>
        </div>

        <!-- Email Input -->
        <div class="form-group">
            <label for="email">Formal Email</label>
            <div class="input-wrapper"
                [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                <i class="ri-mail-star-line input-icon"></i>
                <input type="email" id="email" formControlName="email" class="form-input"
                    placeholder="name@exclusive.com">
            </div>
            <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error-msg">
                Valid business email is required
            </div>
        </div>

        <!-- Password Input -->
        <div class="form-group">
            <label for="password">Security Passphrase</label>
            <div class="input-wrapper"
                [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                <i class="ri-lock-password-line input-icon"></i>
                <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
                    class="form-input" placeholder="Minimum 8 characters">
                <button type="button" class="toggle-password" (click)="togglePassword()">
                    <i [class]="showPassword ? 'ri-eye-line' : 'ri-eye-off-line'"></i>
                </button>
            </div>
            <div *ngIf="registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched"
                class="error-msg">
                Passphrase must be at least 8 characters
            </div>
        </div>

        <!-- Confirm Password Input -->
        <div class="form-group">
            <label for="confirmPassword">Verify Passphrase</label>
            <div class="input-wrapper"
                [class.error]="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched">
                <i class="ri-lock-check-line input-icon"></i>
                <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword"
                    formControlName="confirmPassword" class="form-input" placeholder="Repeat your passphrase">
                <button type="button" class="toggle-password" (click)="toggleConfirmPassword()">
                    <i [class]="showConfirmPassword ? 'ri-eye-line' : 'ri-eye-off-line'"></i>
                </button>
            </div>
            <div *ngIf="registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched"
                class="error-msg">
                Verification does not match
            </div>
        </div>

        <!-- Is Organization Checkbox -->
        <div class="form-check luxury-check">
            <input type="checkbox" id="isOrganization" formControlName="isOrganization" class="form-check-input">
            <label for="isOrganization" class="form-check-label">Register as Elite Organization Partner</label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-primary btn-block" [disabled]="isLoading || registerForm.invalid">
            <span *ngIf="!isLoading">Initiate Membership</span>
            <div *ngIf="isLoading" class="spinner"></div>
        </button>

        <!-- Divider -->
        <div class="divider">
            <span>Or partner with</span>
        </div>

        <!-- Social Login -->
        <button type="button" class="btn-google btn-block" (click)="loginWithGoogle()">
            <i class="ri-google-fill social-icon"></i>
            <span>Partner via Google</span>
        </button>
    </form>

    <div class="auth-footer">
        <p>Already an Elite? <a routerLink="/auth/login" class="link-primary">Sign In</a></p>
    </div>
</div>
