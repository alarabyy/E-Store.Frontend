<div class="theme-colors-container">
    <div class="header">
        <h2>Theme Colors & Settings</h2>
        <p class="subtitle">Customize your website colors professionally</p>
    </div>

    <form [formGroup]="colorsForm" (ngSubmit)="onSubmit()">
        <div class="tabs-container">
            <div class="tabs">
                <button
                    type="button"
                    *ngFor="let group of colorGroups"
                    [class.active]="activeGroup === group.title"
                    (click)="setActiveGroup(group.title)"
                    class="tab-button">
                    {{ group.title }}
                </button>
            </div>
        </div>

        <div class="content-area">
            <div class="color-group" *ngIf="getActiveGroup()">
                <div class="group-header">
                    <h3>{{ getActiveGroup()?.title }}</h3>
                    <button type="button" class="btn-reset-all" (click)="resetAllColors()">
                        Reset All
                    </button>
                </div>

                <div class="colors-grid">
                    <div class="color-item" *ngFor="let color of getActiveGroup()?.colors">
                        <div class="color-label">
                            <label>{{ color.label }}</label>
                            <button
                                type="button"
                                class="btn-reset"
                                (click)="resetColor(color.key)"
                                title="Reset">
                                ↺
                            </button>
                        </div>
                        <div class="color-input-wrapper">
                            <input
                                type="color"
                                class="color-picker"
                                [value]="colorsForm.get(color.key)?.value || color.defaultValue"
                                (input)="colorsForm.get(color.key)?.setValue($any($event.target).value)" />
                            <input
                                type="text"
                                [formControlName]="color.key"
                                class="color-text-input"
                                placeholder="{{ color.defaultValue }}" />
                        </div>
                        <div
                            class="color-preview"
                            [style.background-color]="colorsForm.get(color.key)?.value || color.defaultValue">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn-secondary" (click)="resetAllColors()">
                Reset All
            </button>
            <button type="submit" class="btn-primary" [disabled]="isSaving">
                <span *ngIf="!isSaving">Save Changes</span>
                <span *ngIf="isSaving">Saving...</span>
            </button>
        </div>
    </form>
</div>
