<div class="wishlist-page">
    <div class="wishlist-container">
        <header class="page-header">
            <h1><i class="ri-heart-line"></i> Favorite Products</h1>
            <p>Keep your favorite items to return to them at any time</p>
        </header>

        <!-- Empty State -->
        <div class="empty-state" *ngIf="wishlistService.itemCount === 0">
            <i class="ri-heart-pulse-line icon-lg"></i>
            <h2>Your wishlist is empty</h2>
            <p>You haven't added any products to your wishlist yet. Browse the store and collect the products you love!
            </p>
            <a routerLink="/catalog" class="btn-primary">
                Browse Catalog <i class="ri-arrow-right-line"></i>
            </a>
        </div>

        <!-- Wishlist Content -->
        <div class="wishlist-grid" *ngIf="wishlistService.itemCount > 0">
            <app-product-card *ngFor="let item of mappedProducts()" [product]="$any(item)"></app-product-card>
        </div>
    </div>
</div>
